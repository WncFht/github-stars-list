name: Update stars list

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

concurrency:
  group: update-stars
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate README and data
        env:
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-stars.mjs

      - name: Commit generated files
        run: |
          if git diff --quiet -- README.md data.json; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "${{ github.repository_owner }}"
          git config user.email "actions@users.noreply.github.com"
          git add README.md data.json
          git commit -m "docs: update starred repositories [skip ci]"
          git push
